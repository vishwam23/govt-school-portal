<!DOCTYPE html>
<html>
<head>
    <title>Government School Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>Government School Portal</h1>
    <p>Student Record Management System</p>
</div>

<div class="container">

    <input type="text" id="search" placeholder="Search student by name..." onkeyup="filterData()">

    <div class="table-wrapper">
        <table id="studentTable">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Class</th>
                    <th>Roll No</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
